<!DOCTYPE html>
<html>
<head>
  
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" type="text/css" href="css/bootstrap.min.css">
    <link rel="stylesheet" type="text/css" href="css/estilologin.css ">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600&display=swap" rel="stylesheet">
    <title>Iniciar sesion</title>
</head>

<body>
  <div class="container_todo">

    <div class="back_container">

      <div class="back_container_login">
        <h3>¿Ya tienes cuenta?</h3>
        <p>Inicia Sesion</p>
        <button id="btn_login">Iniciar Sesion</button>
      </div> 

      <div class="back_container_register">
        <h3>¿No tienes cuenta?</h3>
        <p>Registrate</p>   
        <button id="btn_register">Registrarse</button>
      </div> 
    </div>

    <div class="front_container">

      <form class="form_login">
        <h2>Inciar Sesion</h2>
        <input type="text" placeholder="Correo Electronico">
        <input type="password" placeholder="Constraseña">
        <button>Entrar</button>
      </form>

      <form class="form_register">
        <h2>Registrarse</h2>
        <input type="text" placeholder="Nombre Completo">
        <input type="text" placeholder="Correo Electronico">
        <input type="text" placeholder="Usuario">
        <input type="password" placeholder="Contraseña">
        <input type="number" placeholder="Telefono">
        <button>Registrarse</button>
      </form>
    </div>
  </div>

  <script src="/js/script.js"></script>
</body>
</html>
